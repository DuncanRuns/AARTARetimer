<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AA RTA Retimer</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        #dropZone {
            border: 3px dashed #ccc;
            border-radius: 10px;
            padding: 50px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
        }

        #dropZone.dragover {
            border-color: #000;
            background-color: #f0f0f0;
        }

        #output {
            white-space: pre-wrap;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            min-height: 100px;
        }
    </style>
</head>

<body>
    <h1>AA RTA Retimer</h1>
    <div id="dropZone">
        <p>Drag and drop play.log file here or click to select</p>
        <input type="file" id="fileInput" accept=".log" style="display: none;">
    </div>
    <div id="output"></div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');

        function formatTime(millis) {
            const totalSeconds = millis / 1000;
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            return `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toFixed(3).padStart(6, '0')}`;
        }

        function processFile(file) {
            output.textContent = 'Processing...';
            const reader = new FileReader();

            reader.onload = function (e) {
                const lines = e.target.result.split('\n');
                const advancements = new Set();
                let startTime = -1;
                let result = '';

                for (const line of lines) {
                    if (!line.trim()) continue;

                    const j = JSON.parse(line);

                    if (startTime === -1 && j.type === 'game_info' && j.data.players.length > 0) {
                        startTime = j.time;
                    } else if (j.type === 'advancement' && j.data.completed && j.data.display) {
                        const aid = j.data.id;
                        if (advancements.has(aid)) continue;

                        advancements.add(aid);
                        const player = j.data.player.name;
                        if (startTime === -1) {
                            result += `Advancement #${advancements.size} ${aid} completed before time started by ${player}\n`;
                        } else {
                            const totalTime = j.time - startTime;
                            result += `Advancement #${advancements.size} ${aid} completed at ${formatTime(totalTime)} by ${player}\n`;
                        }
                    }
                }

                output.textContent = result || 'No advancements found';
            };

            reader.readAsText(file);
        }

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                processFile(e.target.files[0]);
            }
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                processFile(e.dataTransfer.files[0]);
            }
        });
    </script>
</body>

</html>
